name: Weather Fetch Cron

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  fetch-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install node-fetch@2

      - name: Run Fetch Script
        run: node fetch.js
        env:
          WP_ENDPOINT: ${{ secrets.WP_ENDPOINT }}
          CWF_SECRET: ${{ secrets.CWF_SECRET }}

      - name: Commit Updated Batch State
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add batch-state.json
          git commit -m "Update batch offset" || echo "No changes"
          git push
